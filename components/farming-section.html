<!--
  Farming section archive.
  トップページから外した農場紹介ブロックです。
  「私たちについて」「農場紹介」ページへ再配置できるよう、必要なCSSと画像を同梱しています。
-->
<style>
:root{
  --black:#080806;
  --white:#faf8f4;
  --gold:#c9a84c;
  --gray:#8a8880;
  --border:rgba(255,255,255,.1);
  --serif:'Noto Serif JP',serif;
  --sans:'Noto Sans JP',sans-serif;
}
.sec-label{
  font-family:var(--serif);font-size:clamp(1.45rem,2.6vw,2.15rem);
  font-weight:300;letter-spacing:.04em;line-height:1.45;
  color:var(--black);margin-bottom:1.2rem;text-transform:none;
}
/* ── 02 PRODUCTION (黒背景 左テキスト 右写真) ── */
.production{
  background:var(--black);
  display:grid;grid-template-columns:1fr 1fr;
  min-height:100vh;
}
.production-text,.production-photo{
  animation:farmingFadeUp .8s ease both;
}
.production-photo{animation-delay:.12s;}
@keyframes farmingFadeUp{
  from{opacity:0;transform:translateY(18px);}
  to{opacity:1;transform:translateY(0);}
}
.production-text{
  padding:8rem 5rem 8rem 6rem;
  display:flex;flex-direction:column;justify-content:center;
}
.production-title{
  font-family:var(--serif);font-size:clamp(1.8rem,3.5vw,2.8rem);
  font-weight:300;line-height:1.5;letter-spacing:.04em;
  margin-bottom:1.5rem;color:var(--white);
}
.production-body{
  font-size:.95rem;line-height:2;color:rgba(250,248,244,.5);
  margin-bottom:3rem;max-width:36ch;
}
.production-meta{
  display:grid;grid-template-columns:1fr 1fr;gap:2rem;
  border-top:.5px solid var(--border);padding-top:2rem;
}
.meta-item{}
.meta-label{
  font-size:.5rem;letter-spacing:.22em;text-transform:uppercase;
  color:var(--gold);margin-bottom:.4rem;
}
.meta-value{
  font-family:var(--serif);font-size:1.6rem;font-weight:300;
  color:var(--white);line-height:1;
}
.meta-unit{
  font-size:.62rem;font-family:var(--sans);color:var(--gray);
  letter-spacing:.1em;margin-left:.3rem;
}
.production-photo{
  background:url('https://images.unsplash.com/photo-1548199569-3e1c6aa8f469?w=900&q=85') center 30%/cover no-repeat;
}
@media(max-width:768px){
  .production{grid-template-columns:1fr;min-height:auto;}
  .production-text{padding:5rem 2rem;}
  .production-photo{height:50vw;}
}
</style>

      自然光の中で育つ、<br>
      ノーウィンドレス農場の卵。

    <p class="production-body">
      日光金乃卵®の鶏は、窓のある開放的な鶏舎で自然光を浴びながら育ちます。太陽光によってビタミンDを自ら合成し、免疫力が高まった健康な鶏だけが、この卵を産みます。<br><br>
      季節ごとに飼料配合を見直し、年間を通じて品質を安定させる。複数の契約農場に分散することで、鳥インフルエンザなどのリスクにも備えます。
    </p>
